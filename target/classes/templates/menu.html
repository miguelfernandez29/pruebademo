<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">GTLIA20900</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Menú Principal - Gestión de Bienes</h5>
            </div>
            <div class="card-body">
                <div class="list-group">
                    <a th:href="@{/assets}" class="list-group-item list-group-item-action">
                        <div class="d-flex w-100 justify-content-between">
                            <h5 class="mb-1">Gestión de Bienes</h5>
                        </div>
                        <p class="mb-1">Administrar todos los tipos de bienes de la declaración</p>
                    </a>
                    <a th:href="@{/urban-properties}" class="list-group-item list-group-item-action">
                        <div class="d-flex w-100 justify-content-between">
                            <h5 class="mb-1">Bienes Urbanos</h5>
                        </div>
                        <p class="mb-1">Gestión específica de propiedades urbanas</p>
                    </a>
                    <a th:href="@{/swagger-ui.html}" class="list-group-item list-group-item-action">
                        <div class="d-flex w-100 justify-content-between">
                            <h5 class="mb-1">Documentación API</h5>
                        </div>
                        <p class="mb-1">Acceso a la documentación Swagger de la API REST</p>
                    </a>
                    <a th:href="@{/h2-console}" class="list-group-item list-group-item-action">
                        <div class="d-flex w-100 justify-content-between">
                            <h5 class="mb-1">Consola H2</h5>
                        </div>
                        <p class="mb-1">Acceso a la consola de base de datos H2</p>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
