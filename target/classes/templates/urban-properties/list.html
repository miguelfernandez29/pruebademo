<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienes Urbanos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">GTLIA20900</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/assets}">Bienes</a>
                <a class="nav-link active" th:href="@{/urban-properties}">Urbanos</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Bienes Urbanos</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Secuencia</th>
                                <th>Provincia</th>
                                <th>Municipio</th>
                                <th>Ref. Catastral</th>
                                <th>Tipo</th>
                                <th>Valor Declarado</th>
                                <th>Valor Comprobado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="prop : ${properties}">
                                <td th:text="${prop.cdsecubien}"></td>
                                <td th:text="${prop.cdprovinci}"></td>
                                <td th:text="${prop.cdmunicipi}"></td>
                                <td th:text="${prop.tlrefecata}"></td>
                                <td th:text="${prop.cdtipobien}"></td>
                                <td th:text="${prop.ptdeclarad != null ? #numbers.formatDecimal(prop.ptdeclarad, 1, 2) : '-'}"></td>
                                <td th:text="${prop.ptcomproba != null ? #numbers.formatDecimal(prop.ptcomproba, 1, 2) : '-'}"></td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/urban-properties/edit/{id}(id=${prop.cdsecubien}, aapresenta=${aapresenta}, vftipoimpu=${vftipoimpu}, cdpresenta=${cdpresenta})}"
                                           class="btn btn-outline-primary">Editar</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
