<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Asset List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">GTLIA20900</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/menu">Menu</a>
                <a class="nav-link active" href="/assets">Assets</a>
                <a class="nav-link" href="/swagger-ui.html">API Docs</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 th:text="${title}">Asset Verification List</h2>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card mb-4">
            <div class="card-header">Search Declaration</div>
            <div class="card-body">
                <form method="get" action="/assets" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Presentation Year</label>
                        <input type="text" class="form-control" name="presentationYear" th:value="${presentationYear}" placeholder="2024">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Tax Type</label>
                        <input type="text" class="form-control" name="taxType" th:value="${taxType}" placeholder="01">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Presentation Code</label>
                        <input type="text" class="form-control" name="presentationCode" th:value="${presentationCode}" placeholder="12345678901234">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Search</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${presentationYear != null and taxType != null and presentationCode != null}">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Assets</h4>
                <a th:href="@{/assets/new(presentationYear=${presentationYear}, taxType=${taxType}, presentationCode=${presentationCode})}" class="btn btn-success">Add Asset</a>
            </div>

            <div th:if="${assets != null and !assets.isEmpty()}" class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Sequence</th>
                            <th>Nature</th>
                            <th>Type</th>
                            <th>Position</th>
                            <th>Ownership %</th>
                            <th>Declared Value</th>
                            <th>Verified Value</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="asset : ${assets}">
                            <td th:text="${asset.assetSequence}"></td>
                            <td th:text="${asset.assetNatureDescription}"></td>
                            <td th:text="${asset.assetType}"></td>
                            <td th:text="${asset.assetPosition}"></td>
                            <td th:text="${asset.transmissionPercentage}"></td>
                            <td th:text="${#numbers.formatDecimal(asset.declaredValue, 1, 'COMMA', 2, 'POINT')}"></td>
                            <td th:text="${asset.verifiedValue != null ? #numbers.formatDecimal(asset.verifiedValue, 1, 'COMMA', 2, 'POINT') : '-'}"></td>
                            <td>
                                <a th:href="@{/assets/edit/{year}/{type}/{code}/{seq}(year=${asset.presentationYear}, type=${asset.taxType}, code=${asset.presentationCode}, seq=${asset.assetSequence})}" class="btn btn-sm btn-primary">Edit</a>
                                <form th:action="@{/assets/delete/{year}/{type}/{code}/{seq}(year=${asset.presentationYear}, type=${asset.taxType}, code=${asset.presentationCode}, seq=${asset.assetSequence})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this asset?')">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${assets == null or assets.isEmpty()}" class="alert alert-info">
                No assets found for this declaration.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
