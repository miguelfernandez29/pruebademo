<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Bienes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">GTLIA20900</a>
            <div class="navbar-nav">
                <a class="nav-link active" th:href="@{/assets}">Bienes</a>
                <a class="nav-link" th:href="@{/}">Inicio</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Lista de Bienes</h5>
                <a th:href="@{/assets/new(aapresenta=${aapresenta}, vftipoimpu=${vftipoimpu}, cdpresenta=${cdpresenta})}" 
                   class="btn btn-light btn-sm">
                    <i class="bi bi-plus"></i> Nuevo Bien
                </a>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Año Presentación:</label>
                        <input type="text" class="form-control" th:value="${aapresenta}" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Tipo Impuesto:</label>
                        <input type="text" class="form-control" th:value="${vftipoimpu}" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Código Presentación:</label>
                        <input type="text" class="form-control" th:value="${cdpresenta}" readonly>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Secuencia</th>
                                <th>Naturaleza</th>
                                <th>Valor Declarado</th>
                                <th>Valor Comprobado</th>
                                <th>Fecha Comprobación</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="asset : ${assets}">
                                <td th:text="${asset.cdsecubien}"></td>
                                <td>
                                    <span th:switch="${asset.cdnatbien2}">
                                        <span th:case="'U'">Urbano</span>
                                        <span th:case="'R'">Rústico</span>
                                        <span th:case="'V'">Vehículo</span>
                                        <span th:case="'C'">Cuenta Bancaria</span>
                                        <span th:case="'A'">Actividad Empresarial</span>
                                        <span th:case="'T'">Otros</span>
                                        <span th:case="'N'">Valores No Negociados</span>
                                        <span th:case="*" th:text="${asset.cdnatbien2}"></span>
                                    </span>
                                </td>
                                <td th:text="${asset.ptdeclarad != null ? #numbers.formatDecimal(asset.ptdeclarad, 1, 2) : '-'}"></td>
                                <td th:text="${asset.ptcomproba != null ? #numbers.formatDecimal(asset.ptcomproba, 1, 2) : '-'}"></td>
                                <td th:text="${asset.fccomproba != null ? #temporals.format(asset.fccomproba, 'dd/MM/yyyy') : '-'}"></td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:if="${asset.cdnatbien2 == 'U'}"
                                           th:href="@{/urban-properties/edit/{id}(id=${asset.cdsecubien}, aapresenta=${aapresenta}, vftipoimpu=${vftipoimpu}, cdpresenta=${cdpresenta})}"
                                           class="btn btn-outline-primary">Editar</a>
                                        <a th:unless="${asset.cdnatbien2 == 'U'}"
                                           th:href="@{/assets/edit/{id}(id=${asset.cdsecubien}, aapresenta=${aapresenta}, vftipoimpu=${vftipoimpu}, cdpresenta=${cdpresenta})}"
                                           class="btn btn-outline-primary">Editar</a>
                                        <form th:action="@{/assets/delete/{id}(id=${asset.cdsecubien}, aapresenta=${aapresenta}, vftipoimpu=${vftipoimpu}, cdpresenta=${cdpresenta})}" 
                                              method="post" style="display:inline;">
                                            <button type="submit" class="btn btn-outline-danger" 
                                                    onclick="return confirm('¿Está seguro de eliminar este bien?')">Eliminar</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(assets)}">
                                <td colspan="6" class="text-center">No hay bienes registrados</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
