<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Asset Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">GTLIA20900 - Asset Management</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/menu">Menu</a>
                <a class="nav-link" href="/assets">Assets</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 th:text="${title}">Asset Form</h2>

        <div th:if="${errorMessage}" class="alert alert-danger">
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/assets/{action}(action=${action})}" th:object="${asset}" method="post">
            <input type="hidden" th:field="*{presentationYear}">
            <input type="hidden" th:field="*{taxType}">
            <input type="hidden" th:field="*{presentationCode}">

            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">Document Information</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3">
                            <label class="form-label">Presentation Year</label>
                            <input type="text" class="form-control" th:value="*{presentationYear}" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Tax Type</label>
                            <input type="text" class="form-control" th:value="*{taxType}" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Presentation Code</label>
                            <input type="text" class="form-control" th:value="*{presentationCode}" readonly>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Asset Sequence</label>
                            <input type="text" class="form-control" th:field="*{assetSequence}" 
                                   th:readonly="${action == 'update'}">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">Asset Information</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="assetNature" class="form-label">Asset Nature *</label>
                            <select class="form-select" id="assetNature" th:field="*{assetNature}" required>
                                <option value="">Select Nature</option>
                                <option value="U">Urban Property</option>
                                <option value="R">Rustic Property</option>
                                <option value="V">Vehicle</option>
                                <option value="E">Listed Securities</option>
                                <option value="N">Unlisted Securities</option>
                                <option value="C">Bank Account</option>
                                <option value="A">Business Asset</option>
                                <option value="O">Other Asset</option>
                            </select>
                            <div th:if="${#fields.hasErrors('assetNature')}" class="text-danger">
                                <span th:errors="*{assetNature}"></span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label for="assetPosition" class="form-label">Position (P/G) *</label>
                            <select class="form-select" id="assetPosition" th:field="*{assetPosition}" required>
                                <option value="">Select Position</option>
                                <option value="P">P - Principal</option>
                                <option value="G">G - General</option>
                            </select>
                            <div th:if="${#fields.hasErrors('assetPosition')}" class="text-danger">
                                <span th:errors="*{assetPosition}"></span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label for="transmissionPercentage" class="form-label">Transmission % *</label>
                            <input type="number" class="form-control" id="transmissionPercentage" 
                                   th:field="*{transmissionPercentage}" step="0.01" min="0.01" max="100" required>
                            <div th:if="${#fields.hasErrors('transmissionPercentage')}" class="text-danger">
                                <span th:errors="*{transmissionPercentage}"></span>
                            </div>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="declaredAmount" class="form-label">Declared Amount</label>
                            <input type="number" class="form-control" id="declaredAmount" 
                                   th:field="*{declaredAmount}" step="0.01" min="0">
                            <div th:if="${#fields.hasErrors('declaredAmount')}" class="text-danger">
                                <span th:errors="*{declaredAmount}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="verifiedAmount" class="form-label">Verified Amount</label>
                            <input type="number" class="form-control" id="verifiedAmount" 
                                   th:field="*{verifiedAmount}" step="0.01" min="0">
                            <div th:if="${#fields.hasErrors('verifiedAmount')}" class="text-danger">
                                <span th:errors="*{verifiedAmount}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a th:href="@{/assets(presentationYear=${asset.presentationYear},taxType=${asset.taxType},presentationCode=${asset.presentationCode})}" 
                   class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    <span th:if="${action == 'create'}">Create Asset</span>
                    <span th:if="${action == 'update'}">Update Asset</span>
                </button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
