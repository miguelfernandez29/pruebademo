<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isNew} ? 'Nuevo Bien' : 'Editar Bien'">Formulario de Bien</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">GTLIA20900</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/assets}">Bienes</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0" th:text="${isNew} ? 'Nuevo Bien' : 'Editar Bien'">Formulario</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/assets/save}" th:object="${asset}" method="post">
                    <input type="hidden" th:field="*{aapresenta}">
                    <input type="hidden" th:field="*{vftipoimpu}">
                    <input type="hidden" th:field="*{cdpresenta}">

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Secuencia Bien *</label>
                            <input type="text" class="form-control" th:field="*{cdsecubien}" 
                                   th:readonly="${!isNew}" required>
                            <div th:if="${#fields.hasErrors('cdsecubien')}" class="text-danger">
                                <small th:errors="*{cdsecubien}"></small>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Naturaleza *</label>
                            <select class="form-select" th:field="*{cdnatbien2}" required>
                                <option value="">Seleccione...</option>
                                <option th:each="type : ${natureTypes}" 
                                        th:value="${type.cddatogena}" 
                                        th:text="${type.dsabrev}"></option>
                            </select>
                            <div th:if="${#fields.hasErrors('cdnatbien2')}" class="text-danger">
                                <small th:errors="*{cdnatbien2}"></small>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Valor Declarado</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{ptdeclarad}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Valor Comprobado</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{ptcomproba}">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a th:href="@{/assets(aapresenta=${asset.aapresenta}, vftipoimpu=${asset.vftipoimpu}, cdpresenta=${asset.cdpresenta})}" 
                           class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
