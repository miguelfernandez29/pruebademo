<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Asset List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">GTLIA20900</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="/assets">Assets</a>
                <a class="nav-link" href="/urban-properties">Urban Properties</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Asset List</h2>
        
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card mb-4">
            <div class="card-header">Declaration Parameters</div>
            <div class="card-body">
                <form method="get" action="/assets" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Presentation Year</label>
                        <input type="text" class="form-control" name="presentationYear" th:value="${presentationYear}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Tax Type</label>
                        <input type="text" class="form-control" name="taxType" th:value="${taxType}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Presentation Code</label>
                        <input type="text" class="form-control" name="presentationCode" th:value="${presentationCode}">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary">Search</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="d-flex justify-content-between mb-3">
            <a th:href="@{/assets/add(presentationYear=${presentationYear},taxType=${taxType},presentationCode=${presentationCode})}" 
               class="btn btn-success">Add New Asset</a>
            <div>
                <span class="badge bg-info me-2">Total Declared: <span th:text="${#numbers.formatDecimal(totalDeclaredValue, 1, 2)}">0.00</span></span>
                <span class="badge bg-success">Total Verified: <span th:text="${#numbers.formatDecimal(totalVerifiedValue, 1, 2)}">0.00</span></span>
            </div>
        </div>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Sequence</th>
                    <th>Nature</th>
                    <th>Description</th>
                    <th>Declared Value</th>
                    <th>Verified Value</th>
                    <th>Conformity</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="asset : ${assets}">
                    <td th:text="${asset.assetSequence}"></td>
                    <td th:text="${asset.assetNature}"></td>
                    <td th:text="${asset.assetNatureDescription}"></td>
                    <td th:text="${asset.declaredValue != null ? #numbers.formatDecimal(asset.declaredValue, 1, 2) : '-'}"></td>
                    <td th:text="${asset.verifiedValue != null ? #numbers.formatDecimal(asset.verifiedValue, 1, 2) : '-'}"></td>
                    <td>
                        <span th:class="${asset.conformityStatus == 'Conforming' ? 'badge bg-success' : (asset.conformityStatus == 'Non-Conforming' ? 'badge bg-danger' : 'badge bg-warning')}"
                              th:text="${asset.conformityStatus}"></span>
                    </td>
                    <td>
                        <div class="btn-group btn-group-sm">
                            <a th:if="${asset.assetNature == 'U'}" 
                               th:href="@{/urban-properties/view/{y}/{t}/{c}/{s}(y=${asset.presentationYear},t=${asset.taxType},c=${asset.presentationCode},s=${asset.assetSequence})}"
                               class="btn btn-outline-info">View</a>
                            <a th:if="${asset.assetNature == 'U'}" 
                               th:href="@{/urban-properties/edit/{y}/{t}/{c}/{s}(y=${asset.presentationYear},t=${asset.taxType},c=${asset.presentationCode},s=${asset.assetSequence})}"
                               class="btn btn-outline-primary">Edit</a>
                            <form th:action="@{/assets/delete/{y}/{t}/{c}/{s}(y=${asset.presentationYear},t=${asset.taxType},c=${asset.presentationCode},s=${asset.assetSequence})}" 
                                  method="post" style="display:inline;">
                                <button type="submit" class="btn btn-outline-danger" 
                                        onclick="return confirm('Are you sure you want to delete this asset?')">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(assets)}">
                    <td colspan="7" class="text-center">No assets found</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
