<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Asset List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">GTLIA20900 - Asset Management</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/menu">Menu</a>
                <a class="nav-link active" href="/assets">Assets</a>
                <a class="nav-link" href="/swagger-ui.html">API Docs</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Search Document</h5>
            </div>
            <div class="card-body">
                <form action="/assets" method="get" class="row g-3">
                    <div class="col-md-3">
                        <label for="presentationYear" class="form-label">Presentation Year</label>
                        <input type="text" class="form-control" id="presentationYear" name="presentationYear" 
                               th:value="${presentationYear}" placeholder="2024" maxlength="4">
                    </div>
                    <div class="col-md-3">
                        <label for="taxType" class="form-label">Tax Type</label>
                        <input type="text" class="form-control" id="taxType" name="taxType" 
                               th:value="${taxType}" placeholder="01" maxlength="2">
                    </div>
                    <div class="col-md-4">
                        <label for="presentationCode" class="form-label">Presentation Code</label>
                        <input type="text" class="form-control" id="presentationCode" name="presentationCode" 
                               th:value="${presentationCode}" placeholder="00000000000001" maxlength="14">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Search</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${assets != null}">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Assets</h4>
                <a th:href="@{/assets/new(presentationYear=${presentationYear},taxType=${taxType},presentationCode=${presentationCode})}" 
                   class="btn btn-success">Add New Asset</a>
            </div>

            <div th:if="${#lists.isEmpty(assets)}" class="alert alert-info">
                No assets found for this document.
            </div>

            <table th:if="${!#lists.isEmpty(assets)}" class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Sequence</th>
                        <th>Nature</th>
                        <th>Position</th>
                        <th>Transmission %</th>
                        <th>Declared Amount</th>
                        <th>Verified Amount</th>
                        <th>Proportional</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="asset : ${assets}">
                        <td th:text="${asset.assetSequence}"></td>
                        <td th:text="${asset.assetNatureDescription}"></td>
                        <td th:text="${asset.assetPosition}"></td>
                        <td th:text="${asset.transmissionPercentage} + '%'"></td>
                        <td th:text="${#numbers.formatDecimal(asset.declaredAmount, 1, 'COMMA', 2, 'POINT')}"></td>
                        <td th:text="${#numbers.formatDecimal(asset.verifiedAmount, 1, 'COMMA', 2, 'POINT')}"></td>
                        <td th:text="${#numbers.formatDecimal(asset.proportionalVerifiedAmount, 1, 'COMMA', 2, 'POINT')}"></td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/assets/detail/{seq}(seq=${asset.assetSequence},presentationYear=${presentationYear},taxType=${taxType},presentationCode=${presentationCode})}" 
                                   class="btn btn-info">View</a>
                                <a th:href="@{/assets/edit/{seq}(seq=${asset.assetSequence},presentationYear=${presentationYear},taxType=${taxType},presentationCode=${presentationCode})}" 
                                   class="btn btn-warning">Edit</a>
                                <form th:action="@{/assets/delete/{seq}(seq=${asset.assetSequence},presentationYear=${presentationYear},taxType=${taxType},presentationCode=${presentationCode})}" 
                                      method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-danger" 
                                            onclick="return confirm('Are you sure you want to delete this asset?')">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
