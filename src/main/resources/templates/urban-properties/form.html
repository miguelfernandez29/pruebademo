<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Urban Property Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">GTLIA20900</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/assets">Assets</a>
                <a class="nav-link active" href="/urban-properties">Urban Properties</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 th:text="${title}">Urban Property Form</h2>
        
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/urban-properties/save}" th:object="${property}" method="post">
            <input type="hidden" th:field="*{presentationYear}">
            <input type="hidden" th:field="*{taxType}">
            <input type="hidden" th:field="*{presentationCode}">
            <input type="hidden" th:field="*{assetSequence}">
            <input type="hidden" name="action" th:value="${action}">

            <div class="card mb-4">
                <div class="card-header">Location Information</div>
