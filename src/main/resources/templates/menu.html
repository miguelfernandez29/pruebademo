<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Main Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">GTLIA20900 - Asset Management</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="/menu">Menu</a>
                <a class="nav-link" href="/assets">Assets</a>
                <a class="nav-link" href="/swagger-ui.html">API Docs</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Main Menu</h2>
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card mb-3">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Asset Management</h5>
                    </div>
                    <div class="list-group list-group-flush">
                        <a href="/assets" class="list-group-item list-group-item-action">View All Assets</a>
                        <a href="/assets?presentationYear=2024&taxType=01&presentationCode=00000000000001" 
                           class="list-group-item list-group-item-action">Sample Document Assets</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-3">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Quick Actions</h5>
                    </div>
                    <div class="list-group list-group-flush">
                        <a href="/assets/new?presentationYear=2024&taxType=01&presentationCode=00000000000001" 
                           class="list-group-item list-group-item-action">Add New Asset</a>
                        <a href="/swagger-ui.html" class="list-group-item list-group-item-action">API Documentation</a>
                        <a href="/h2-console" class="list-group-item list-group-item-action">Database Console</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card mt-4">
            <div class="card-header">
                <h5 class="mb-0">Search Document</h5>
            </div>
            <div class="card-body">
                <form action="/assets" method="get" class="row g-3">
                    <div class="col-md-3">
                        <label for="presentationYear" class="form-label">Presentation Year</label>
                        <input type="text" class="form-control" id="presentationYear" name="presentationYear" 
                               placeholder="2024" maxlength="4">
                    </div>
                    <div class="col-md-3">
                        <label for="taxType" class="form-label">Tax Type</label>
                        <input type="text" class="form-control" id="taxType" name="taxType" 
                               placeholder="01" maxlength="2">
                    </div>
                    <div class="col-md-4">
                        <label for="presentationCode" class="form-label">Presentation Code</label>
                        <input type="text" class="form-control" id="presentationCode" name="presentationCode" 
                               placeholder="00000000000001" maxlength="14">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Search</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
